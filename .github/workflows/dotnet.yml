name: .NET Nightly Release

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet publish -c Release

      - name: Create artifact archive
        run: |
          mkdir -p artifacts
          tar -czf artifacts/random-counter-${{ github.run_id }}.tar.gz -C ./bin/Release/net10.0/linux-x64/publish .

      - name: Ensure 'Nightly' release exists (create or update)
        id: ensure_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = 'nightly';
            const name = 'Nightly';
            const body = `Nightly build — run ${context.runNumber} (${context.runId})`;
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            let rel = releases.data.find(r => r.tag_name === tag || r.name === name);
            if (!rel) {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name,
                body,
                draft: false,
                prerelease: false,
                generate_release_notes: false,
              });
              rel = created.data;
            } else {
              const updated = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id,
                name,
                body,
                draft: false,
                prerelease: false,
              });
              rel = updated.data;
            }
            core.setOutput('release_id', rel.id);
            return { release_id: rel.id };

      - name: Delete existing assets from Nightly release
        uses: actions/github-script@v7
        with:
          script: |
            const release_id = parseInt(${JSON.stringify("${{ steps.ensure_release.outputs.release_id }}")});
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id,
              per_page: 100,
            });
            for (const a of assets.data) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: a.id,
              });
            }

      - name: Upload artifact to Nightly release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.ensure_release.outputs.upload_url }}
          asset_path: artifacts/random-counter-${{ github.run_id }}.tar.gz
          asset_name: random-counter.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
